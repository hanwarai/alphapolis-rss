name: github pages publish

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    env:
      PAGES_BASE_URL: https://hanwarai.github.io/alphapolis-rss
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install the project
        run: uv sync --all-extras

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Seed feeds/ from previously deployed site
        run: |
          mkdir -p feeds
          curl -sfL -o feeds/index.html "$PAGES_BASE_URL/" || true
          while IFS=, read -r feed_id _; do
            if [[ "$feed_id" =~ ^[0-9]+$ ]]; then
              curl -sfL -o "feeds/${feed_id}.xml" "$PAGES_BASE_URL/${feed_id}.xml" || true
            fi
          done < feed.csv
          ls -la feeds/

      - name: main.py
        run: uv run main.py

      - name: Deploy
        uses: actions/upload-pages-artifact@v5
        with:
          path: feeds

  publish:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
